# Bun remains the source of truth for application dependencies, so npm package
# update PRs stay disabled. Keep GitHub Actions updates conservative but on so
# security and workflow patching do not depend on ad hoc maintenance alone.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"
