name: Deploy to IPFS

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/client/**'
      - 'packages/admin/**'
      - 'packages/shared/**'
      - 'packages/contracts/deployments/**'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/admin/**'
      - 'packages/shared/**'
      - 'packages/contracts/deployments/**'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy'
        required: true
        type: choice
        options:
          - both
          - client
          - admin

# Required permissions for PR comments and commit status
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  deploy:
    name: Deploy ${{ matrix.title }} to IPFS
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: client
            title: Client
            build: build:client
            dist: packages/client/dist
            icon: 🌱
            prod_app_url: https://greengoods.app
            prod_domain: greengoods.app
            prod_dnslink_name: _dnslink
            staging_app_url: https://staging.greengoods.app
            staging_domain: staging.greengoods.app
            staging_dnslink_name: _dnslink.staging

          - app: admin
            title: Admin
            build: build:admin
            dist: packages/admin/dist
            icon: 🛠️
            prod_app_url: https://admin.greengoods.app
            prod_domain: admin.greengoods.app
            prod_dnslink_name: _dnslink.admin
            staging_app_url: https://admin-staging.greengoods.app
            staging_domain: admin-staging.greengoods.app
            staging_dnslink_name: _dnslink.admin-staging

    outputs:
      cid: ${{ steps.pinata.outputs.cid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=production" >> $GITHUB_OUTPUT
            echo "chain_id=42161" >> $GITHUB_OUTPUT
            echo "app_url=${{ matrix.prod_app_url }}" >> $GITHUB_OUTPUT
            echo "domain=${{ matrix.prod_domain }}" >> $GITHUB_OUTPUT
            echo "dnslink_name=${{ matrix.prod_dnslink_name }}" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "chain_id=11155111" >> $GITHUB_OUTPUT
            echo "app_url=${{ matrix.staging_app_url }}" >> $GITHUB_OUTPUT
            echo "domain=${{ matrix.staging_domain }}" >> $GITHUB_OUTPUT
            echo "dnslink_name=${{ matrix.staging_dnslink_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Check deploy preconditions
        id: preflight
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENVIRONMENT: ${{ vars.OP_ENVIRONMENT }}
        run: |
          missing=()
          [[ -z "$PINATA_JWT" ]] && missing+=("PINATA_JWT")
          [[ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]] && missing+=("OP_SERVICE_ACCOUNT_TOKEN")
          [[ -z "$OP_ENVIRONMENT" ]] && missing+=("OP_ENVIRONMENT (variable)")

          if [[ ${#missing[@]} -gt 0 ]]; then
            joined=$(IFS=, ; echo "${missing[*]}")
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "::warning::Skipping IPFS deploy — required secrets/vars not available in this PR context: $joined"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "::error::Required secrets/vars not configured: $joined"
              exit 1
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ Deploy preconditions satisfied"
          fi

      - name: Load env vars from Varlock + 1Password environment
        if: steps.preflight.outputs.skip != 'true'
        env:
          APP_ENV: ${{ steps.env.outputs.env }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENVIRONMENT: ${{ vars.OP_ENVIRONMENT }}
        run: |
          bunx varlock run -- bash -lc '
            for key in \
              VITE_WALLETCONNECT_PROJECT_ID \
              VITE_PIMLICO_API_KEY \
              VITE_ENVIO_INDEXER_URL \
              VITE_POSTHOG_KEY
            do
              val="${!key:-}"
              if [[ -n "$val" ]]; then
                printf "%s=%s\n" "$key" "$val" >> "$GITHUB_ENV"
              fi
            done
          '

      - name: Build ${{ matrix.title }}
        if: steps.preflight.outputs.skip != 'true'
        run: bun run ${{ matrix.build }}
        env:
          APP_ENV: ${{ steps.env.outputs.env }}
          VITE_USE_HASH_ROUTER: 'true'
          VITE_CHAIN_ID: ${{ steps.env.outputs.chain_id }}
          VITE_POSTHOG_HOST: "https://app.posthog.com"
          VITE_APP_URL: ${{ steps.env.outputs.app_url }}

      - name: Deploy to Pinata
        id: pinata
        if: steps.preflight.outputs.skip != 'true'
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_NAME: ${{ matrix.app }}-${{ steps.env.outputs.env }}-${{ github.sha }}
        run: |
          echo "📌 Uploading ${{ matrix.dist }} to Pinata..."
          CID=$(node scripts/pinata-deploy.js "${{ matrix.dist }}")

          if [[ -z "$CID" ]]; then
            echo "::error::Failed to get CID from Pinata upload"
            exit 1
          fi

          echo "cid=$CID" >> $GITHUB_OUTPUT
          echo "✅ Deployed to Pinata with CID: $CID"

      # Update GitHub commit status
      - name: Update commit status
        if: steps.pinata.outputs.cid != ''
        env:
          GH_TOKEN: ${{ github.token }}
          CID: ${{ steps.pinata.outputs.cid }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state=success \
            -f target_url="https://greengoods.mypinata.cloud/ipfs/$CID" \
            -f description="${{ matrix.title }} deployed to IPFS" \
            -f context="IPFS / ${{ matrix.title }}"

      # Add PR comment with deployment info
      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.pinata.outputs.cid != ''
        uses: actions/github-script@v7
        env:
          CID: ${{ steps.pinata.outputs.cid }}
          APP_TITLE: ${{ matrix.title }}
          APP_ICON: ${{ matrix.icon }}
        with:
          script: |
            const cid = process.env.CID;
            const title = process.env.APP_TITLE;
            const icon = process.env.APP_ICON;

            const body = `## ${icon} ${title} Preview Deployed to IPFS

            **CID:** \`${cid}\`

            ### 🌐 Preview Links
            - [Pinata Gateway](https://greengoods.mypinata.cloud/ipfs/${cid})
            - [dweb.link](https://${cid}.ipfs.dweb.link)
            - [Cloudflare Gateway](https://${cid}.ipfs.cf-ipfs.com)

            ---
            <sub>Deployed via Pinata</sub>`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `## ${icon} ${title} Preview`;
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Validate deployment
        if: steps.preflight.outputs.skip != 'true' && steps.pinata.outputs.cid == ''
        run: |
          echo "❌ IPFS deployment failed: no CID returned"
          exit 1

      - name: Skip notice
        if: steps.preflight.outputs.skip == 'true'
        run: |
          echo "ℹ️ IPFS deploy skipped for ${{ matrix.title }} — secrets not available in this PR context."

      - name: Deployment Summary
        if: steps.pinata.outputs.cid != ''
        env:
          CID: ${{ steps.pinata.outputs.cid }}
          ENV_NAME: ${{ steps.env.outputs.env }}
          CHAIN_ID: ${{ steps.env.outputs.chain_id }}
          DOMAIN: ${{ steps.env.outputs.domain }}
          DNSLINK_NAME: ${{ steps.env.outputs.dnslink_name }}
        run: |
          echo "## ${{ matrix.icon }} ${{ matrix.title }} deployed to IPFS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | $ENV_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| **Chain ID** | $CHAIN_ID |" >> $GITHUB_STEP_SUMMARY
          echo "| **CID** | \`$CID\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Automated Steps Completed" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Built ${{ matrix.title }} app" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Uploaded to Pinata (IPFS pinning)" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Updated GitHub commit status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Manual Step: Update DNSLink" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To make \`$DOMAIN\` serve this deployment, update your DNS:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Record Type | Name | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| TXT | \`$DNSLINK_NAME\` | \`dnslink=/ipfs/$CID\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Gateway Links (available immediately)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Pinata Gateway](https://greengoods.mypinata.cloud/ipfs/$CID)" >> $GITHUB_STEP_SUMMARY
          echo "- [dweb.link](https://$CID.ipfs.dweb.link)" >> $GITHUB_STEP_SUMMARY
          echo "- [Service Worker Gateway](https://$CID.ipfs.inbrowser.link)" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloudflare](https://$CID.ipfs.cf-ipfs.com)" >> $GITHUB_STEP_SUMMARY
