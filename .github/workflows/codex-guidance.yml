name: Codex Guidance Consistency

on:
  push:
    branches: [main, develop]
    paths:
      - "AGENTS.md"
      - "packages/*/AGENTS.md"
      - ".codex/**"
      - "docs/docs/builders/agentic/codex.mdx"
      - "scripts/check-codex-consistency.js"
      - "package.json"
      - "packages/*/package.json"
      - ".github/workflows/codex-guidance.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "AGENTS.md"
      - "packages/*/AGENTS.md"
      - ".codex/**"
      - "docs/docs/builders/agentic/codex.mdx"
      - "scripts/check-codex-consistency.js"
      - "package.json"
      - "packages/*/package.json"
      - ".github/workflows/codex-guidance.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check Codex consistency
        run: node scripts/check-codex-consistency.js
