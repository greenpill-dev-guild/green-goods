name: Claude Eval Surface Sync

on:
  push:
    branches: [main, develop]
    paths:
      - ".claude/agents/**"
      - ".claude/evals/**"
      - ".claude/skills/**"
      - "docs/docs/builders/agentic/context-engineering.mdx"
      - "docs/docs/builders/agentic/spec-engineering.mdx"
      - "docs/docs/builders/quality/agentic-eval.mdx"
      - ".github/workflows/claude-agent-evals.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - ".claude/agents/**"
      - ".claude/evals/**"
      - ".claude/skills/**"
      - "docs/docs/builders/agentic/context-engineering.mdx"
      - "docs/docs/builders/agentic/spec-engineering.mdx"
      - "docs/docs/builders/quality/agentic-eval.mdx"
      - ".github/workflows/claude-agent-evals.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  surface-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify committed agent and eval surfaces
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t agents < <(find .claude/agents -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sort)
          expected_agents=("cracked-coder.md" "oracle.md")
          if [[ "${agents[*]}" != "${expected_agents[*]}" ]]; then
            echo "Unexpected committed agent surface: ${agents[*]}" >&2
            exit 1
          fi

          mapfile -t eval_dirs < <(
            find .claude/evals -mindepth 1 -maxdepth 1 -type d ! -name '.*' -printf '%f\n' | sort
          )
          expected_eval_dirs=("acceptance")
          if [[ "${eval_dirs[*]}" != "${expected_eval_dirs[*]}" ]]; then
            echo "Unexpected eval directories: ${eval_dirs[*]}" >&2
            exit 1
          fi

          test -f .claude/evals/README.md

      - name: Surface summary
        run: |
          echo "## Claude Eval Surface Sync" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Committed agents: cracked-coder, oracle" >> $GITHUB_STEP_SUMMARY
          echo "- Live eval directories: acceptance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
