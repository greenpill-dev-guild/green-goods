name: Design Guardrails

on:
  push:
    branches: [main, develop]
    paths:
      - "CLAUDE.md"
      - "DESIGN.md"
      - ".claude/registry/skills.json"
      - ".claude/skills/design/**"
      - ".claude/skills/ui/**"
      - "packages/admin/DESIGN.md"
      - "packages/client/DESIGN.md"
      - "packages/client/DESIGN.pwa.md"
      - "packages/client/DESIGN.browser.md"
      - "docs/DESIGN.md"
      - "packages/admin/src/**"
      - "packages/client/src/**"
      - "packages/shared/src/**"
      - "scripts/design-md-generate.mjs"
      - "scripts/check-design-tokens.sh"
      - "scripts/check-i18n-vocab.sh"
      - ".github/workflows/design-guardrails.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "CLAUDE.md"
      - "DESIGN.md"
      - ".claude/registry/skills.json"
      - ".claude/skills/design/**"
      - ".claude/skills/ui/**"
      - "packages/admin/DESIGN.md"
      - "packages/client/DESIGN.md"
      - "packages/client/DESIGN.pwa.md"
      - "packages/client/DESIGN.browser.md"
      - "docs/DESIGN.md"
      - "packages/admin/src/**"
      - "packages/client/src/**"
      - "packages/shared/src/**"
      - "scripts/design-md-generate.mjs"
      - "scripts/check-design-tokens.sh"
      - "scripts/check-i18n-vocab.sh"
      - ".github/workflows/design-guardrails.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  design-guardrails:
    name: Design Guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/workflows/setup-bun-action

      - name: Check DesignMD
        run: bun run check:design-md

      - name: Check generated DesignMD artifacts
        run: bun run check:design-generated

      - name: Check design tokens
        run: bun run check:design-tokens

      - name: Check banned vocabulary
        run: bun run lint:vocab
