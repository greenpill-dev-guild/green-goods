name: Shared

on:
  push:
    branches: [main, develop]
    paths:
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".env.schema"
      - ".github/workflows/**"
      - "scripts/**/*.cjs"
      - "scripts/**/*.js"
      - "scripts/**/*.mjs"
      - "scripts/**/*.ts"
      - "packages/**/*.js"
      - "packages/**/*.jsx"
      - "packages/**/*.ts"
      - "packages/**/*.tsx"
      - "packages/**/package.json"
      - "packages/contracts/abis/**"
      - "packages/contracts/deployments/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".env.schema"
      - ".github/workflows/**"
      - "scripts/**/*.cjs"
      - "scripts/**/*.js"
      - "scripts/**/*.mjs"
      - "scripts/**/*.ts"
      - "packages/**/*.js"
      - "packages/**/*.jsx"
      - "packages/**/*.ts"
      - "packages/**/*.tsx"
      - "packages/**/package.json"
      - "packages/contracts/abis/**"
      - "packages/contracts/deployments/**"
  schedule:
    - cron: "19 7 * * 1"

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Shared Impact
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Detect shared-impacting paths
        id: filter
        uses: actions/github-script@v9
        with:
          script: |
            const exact = new Set([
              "package.json",
              "bun.lock",
              "biome.json",
              ".env.schema",
              ".github/workflows/shared.yml",
            ]);
            const prefixes = [
              "packages/contracts/abis/",
              "packages/contracts/deployments/",
              "packages/shared/",
            ];

            async function changedFiles() {
              if (context.eventName === "schedule") {
                return ["package.json"];
              }

              if (context.eventName === "pull_request") {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  per_page: 100,
                });
                return files.map((file) => file.filename);
              }

              if (context.eventName === "push") {
                const before = context.payload.before;
                const after = context.sha;
                if (!before || /^0+$/.test(before)) {
                  return ["package.json"];
                }
                const comparison = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${before}...${after}`,
                });
                return comparison.data.files.map((file) => file.filename);
              }

              return ["package.json"];
            }

            const files = await changedFiles();
            const shared = files.some((file) => exact.has(file) || prefixes.some((prefix) => file.startsWith(prefix)));
            core.setOutput("shared", shared ? "true" : "false");

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run shared tests with coverage
        working-directory: packages/shared
        run: bun run coverage
        env:
          CI: true

  lint-typecheck:
    name: Lint And Typecheck
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run shared lint
        working-directory: packages/shared
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck shared
        working-directory: packages/shared
        run: bun run typecheck
