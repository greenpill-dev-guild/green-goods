name: README Onboarding Guard

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "package.json"
      - "docs/scripts/docs-audit.mjs"
      - "docs/docs/builders/getting-started.mdx"
      - "docs/docs/builders/architecture.mdx"
      - "docs/docs/builders/operations.mdx"
      - "docs/docs/builders/how-to-contribute.mdx"
      - "docs/docs/builders/packages/api-index.mdx"
      - "docs/docs/builders/agentic/prompting-green-goods.mdx"
      - ".github/workflows/readme-onboarding.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "package.json"
      - "docs/scripts/docs-audit.mjs"
      - "docs/docs/builders/getting-started.mdx"
      - "docs/docs/builders/architecture.mdx"
      - "docs/docs/builders/operations.mdx"
      - "docs/docs/builders/how-to-contribute.mdx"
      - "docs/docs/builders/packages/api-index.mdx"
      - "docs/docs/builders/agentic/prompting-green-goods.mdx"
      - ".github/workflows/readme-onboarding.yml"

permissions:
  contents: read

concurrency:
  group: readme-onboarding-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit README onboarding contract
        run: bun run docs:audit:readme
