name: Agent

on:
  push:
    branches: [main, develop]
    paths:
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".env.schema"
      - "packages/agent/**"
      - "packages/shared/**"
      - ".github/workflows/agent.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".env.schema"
      - "packages/agent/**"
      - "packages/shared/**"
      - ".github/workflows/agent.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run agent tests with coverage
        working-directory: packages/agent
        run: bun run test:coverage
        env:
          CI: true
          ENCRYPTION_SECRET: "test-secret-for-ci-encryption-32chars"
          TELEGRAM_BOT_TOKEN: "test-bot-token"
          VITE_RPC_URL_11155111: "http://localhost:3009"

  lint-typecheck-build:
    name: Lint Typecheck And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run agent lint
        working-directory: packages/agent
        run: bun run lint

      - name: Check agent formatting
        working-directory: packages/agent
        run: bun run format:check

      - name: Typecheck agent
        working-directory: packages/agent
        run: bun run typecheck

      - name: Build agent
        working-directory: packages/agent
        run: bun run build
