name: Contracts

on:
  push:
    branches: [main, develop]
    paths:
      - "package.json"
      - "bun.lock"
      - ".env.schema"
      - "packages/contracts/**"
      - "scripts/contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "package.json"
      - "bun.lock"
      - ".env.schema"
      - "packages/contracts/**"
      - "scripts/contracts/**"
      - ".github/workflows/contracts.yml"
  workflow_dispatch:
    inputs:
      operation:
        description: "Contracts operation to run"
        required: true
        type: choice
        options:
          - fork-readiness
          - ci
          - all
        default: fork-readiness

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit Tests
    if: github.event_name != 'workflow_dispatch' || inputs.operation == 'ci' || inputs.operation == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run contract unit tests
        working-directory: packages/contracts
        run: bun run test
        env:
          CI: true

  lint-build:
    name: Lint And Build
    if: github.event_name != 'workflow_dispatch' || inputs.operation == 'ci' || inputs.operation == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run contract lint
        working-directory: packages/contracts
        run: bun run lint

      - name: Build contracts
        working-directory: packages/contracts
        run: bun run build

  realism-audit:
    name: Test Realism Audit
    if: github.event_name != 'workflow_dispatch' || inputs.operation == 'ci' || inputs.operation == 'all'
    runs-on: ubuntu-latest
    # Static source/test audit; run beside unit tests so Contracts CI is not
    # gated by unit duration plus a second setup/install pass.
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve realism gate phase
        id: realism-phase
        run: |
          TODAY="$(date -u +%F)"
          if [[ "$TODAY" < "2026-02-26" ]]; then
            MODE="advisory"
            THRESHOLD="0.70"
            PHASE="phase-0"
          elif [[ "$TODAY" < "2026-03-05" ]]; then
            MODE="enforce-must-fix"
            THRESHOLD="0.70"
            PHASE="phase-1"
          elif [[ "$TODAY" < "2026-03-19" ]]; then
            MODE="enforce-should-fix"
            THRESHOLD="0.80"
            PHASE="phase-2"
          else
            MODE="enforce-should-fix"
            THRESHOLD="0.90"
            PHASE="phase-3"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "revert_threshold=$THRESHOLD" >> "$GITHUB_OUTPUT"
          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Validate realism audit tooling
        working-directory: packages/contracts
        run: bun run test:audit:realism:tooling

      - name: Run contracts realism audit
        working-directory: packages/contracts
        run: bun run test:audit:realism
        env:
          CI: true
          CONTRACT_REALISM_MODE: ${{ steps.realism-phase.outputs.mode }}
          REALISM_REVERT_THRESHOLD: ${{ steps.realism-phase.outputs.revert_threshold }}
          CONTRACT_REALISM_REPORT_MD: ../../output/contracts-test-audit/realism-report-ci.md
          CONTRACT_REALISM_REPORT_JSON: ../../output/contracts-test-audit/realism-report-ci.json

      - name: Upload realism audit artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: contracts-test-realism-audit
          path: output/contracts-test-audit/
          retention-days: 14

  fork-readiness:
    name: Fork Readiness / ${{ matrix.label }}
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.operation == 'fork-readiness' || inputs.operation == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: arbitrum
            label: Arbitrum
            script: test:fork:arbitrum:ci
          - shard: sepolia
            label: Sepolia
            script: test:fork:sepolia:ci
          - shard: ethereum
            label: Ethereum ENS
            script: test:fork:ethereum:ci
          - shard: gardens
            label: Gardens And Deployment
            script: test:fork:gardens:ci
          - shard: octant
            label: Octant Readiness
            script: test:fork:octant:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve fork RPCs and block pins
        env:
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          ARBITRUM_FORK_BLOCK_NUMBER: ${{ vars.ARBITRUM_FORK_BLOCK_NUMBER || '466388412' }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          SEPOLIA_FORK_BLOCK_NUMBER: ${{ vars.SEPOLIA_FORK_BLOCK_NUMBER || '10917257' }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          ETHEREUM_FORK_BLOCK_NUMBER: ${{ vars.ETHEREUM_FORK_BLOCK_NUMBER || '25170563' }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY }}
          VITE_ALCHEMY_API_KEY: ${{ secrets.VITE_ALCHEMY_API_KEY }}
          PUBLIC_ARBITRUM_RPC_URL: https://arbitrum-one.public.blastapi.io
          PUBLIC_SEPOLIA_RPC_URL: https://sepolia.drpc.org
          PUBLIC_ETHEREUM_RPC_URL: https://ethereum.drpc.org
        run: |
          set -euo pipefail

          ALCHEMY_KEY_VALUE="${ALCHEMY_API_KEY:-$ALCHEMY_KEY}"
          ALCHEMY_KEY_VALUE="${ALCHEMY_KEY_VALUE:-$VITE_ALCHEMY_API_KEY}"

          if [[ -z "$ARBITRUM_RPC_URL" ]]; then
            if [[ -n "$ALCHEMY_KEY_VALUE" ]]; then
              ARBITRUM_RPC_URL="https://arb-mainnet.g.alchemy.com/v2/$ALCHEMY_KEY_VALUE"
              echo "::notice::ARBITRUM_RPC_URL secret is not configured; using derived Alchemy Arbitrum RPC from existing key secret."
            else
              ARBITRUM_RPC_URL="$PUBLIC_ARBITRUM_RPC_URL"
              echo "::warning::ARBITRUM_RPC_URL secret is not configured; using public Arbitrum RPC fallback."
            fi
          fi

          if [[ -z "$SEPOLIA_RPC_URL" ]]; then
            SEPOLIA_RPC_URL="$PUBLIC_SEPOLIA_RPC_URL"
            echo "::warning::SEPOLIA_RPC_URL secret is not configured; using public Sepolia RPC fallback."
          fi

          if [[ -z "$ETHEREUM_RPC_URL" ]]; then
            ETHEREUM_RPC_URL="$PUBLIC_ETHEREUM_RPC_URL"
            echo "::warning::ETHEREUM_RPC_URL secret is not configured; using public Ethereum RPC fallback."
          fi

          echo "::add-mask::$ARBITRUM_RPC_URL"
          echo "::add-mask::$SEPOLIA_RPC_URL"
          echo "::add-mask::$ETHEREUM_RPC_URL"
          echo "ARBITRUM_RPC_URL=$ARBITRUM_RPC_URL" >> "$GITHUB_ENV"
          echo "ARBITRUM_FORK_RPC_URL=$ARBITRUM_RPC_URL" >> "$GITHUB_ENV"
          echo "ARBITRUM_FORK_BLOCK_NUMBER=$ARBITRUM_FORK_BLOCK_NUMBER" >> "$GITHUB_ENV"
          echo "SEPOLIA_RPC_URL=$SEPOLIA_RPC_URL" >> "$GITHUB_ENV"
          echo "SEPOLIA_FORK_RPC_URL=$SEPOLIA_RPC_URL" >> "$GITHUB_ENV"
          echo "SEPOLIA_FORK_BLOCK_NUMBER=$SEPOLIA_FORK_BLOCK_NUMBER" >> "$GITHUB_ENV"
          echo "ETHEREUM_RPC_URL=$ETHEREUM_RPC_URL" >> "$GITHUB_ENV"
          echo "ETHEREUM_FORK_RPC_URL=$ETHEREUM_RPC_URL" >> "$GITHUB_ENV"
          echo "MAINNET_RPC_URL=$ETHEREUM_RPC_URL" >> "$GITHUB_ENV"
          echo "ETHEREUM_FORK_BLOCK_NUMBER=$ETHEREUM_FORK_BLOCK_NUMBER" >> "$GITHUB_ENV"
          echo "MAINNET_FORK_BLOCK_NUMBER=$ETHEREUM_FORK_BLOCK_NUMBER" >> "$GITHUB_ENV"
          echo "::notice::Fork shard=${{ matrix.shard }} blocks: arbitrum=$ARBITRUM_FORK_BLOCK_NUMBER sepolia=$SEPOLIA_FORK_BLOCK_NUMBER ethereum=$ETHEREUM_FORK_BLOCK_NUMBER"

      - name: Run ${{ matrix.label }} fork shard
        working-directory: packages/contracts
        run: bun run ${{ matrix.script }}
        env:
          COOKIE_JAR_FACTORY_ADDRESS: ${{ secrets.COOKIE_JAR_FACTORY_ADDRESS }}
          CI: true
