# fly.toml — Green Goods agent deployment config
#
# Co-located with the agent package. Always invoke flyctl from the REPO
# ROOT (not packages/agent) so the Docker build context includes the
# workspace's root package.json, bun.lock, packages/, docs/, scripts/.
# The Dockerfile's COPY statements assume repo root as build context.
#
# Deploy from the repo root:
#
#   flyctl launch --no-deploy --config packages/agent/fly.toml --dockerfile packages/agent/Dockerfile
#   flyctl volumes create agent_data --config packages/agent/fly.toml --region iad --size 1
#   flyctl secrets set --config packages/agent/fly.toml \
#       TELEGRAM_BOT_TOKEN=<botfather-token> \
#       ENCRYPTION_SECRET=<32+-char-secret> \
#       BOT_API_TOKEN=<routine-auth-bearer-token>
#   flyctl deploy --config packages/agent/fly.toml
#
# After deploy, the bot is reachable at https://green-goods-agent.fly.dev.
# Use that URL as BOT_API_URL in the claude.ai/code/routines env for
# gg-client-polish and gg-morning-watch (the routines that consume
# Telegram feedback via /api/feedback + /api/notify).
#
# The TELEGRAM_BOT_TOKEN unlocks /bug /idea commands from the gardener
# Telegram channel, which gg-client-polish Phase 1b turns into polish +
# source:telegram issues on the Bug Board.

app = "green-goods-agent"
primary_region = "iad"  # US East. Change if you prefer closer region.
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "packages/agent/Dockerfile"
  # Dockerfile path is relative to the build context (repo root when you
  # run `flyctl deploy --config packages/agent/fly.toml` from repo root).
  # Dockerfile's `COPY package.json bun.lock ./` then resolves against
  # repo root and workspace deps install correctly.

[env]
  NODE_ENV = "production"
  BOT_MODE = "webhook"        # switch from polling once webhook URL is stable
  PORT = "8080"               # Fly routes http_service to internal_port
  HOST = "0.0.0.0"
  DB_PATH = "/data/agent.db"
  ANALYTICS_ENABLED = "true"
  POSTHOG_HOST = "https://us.i.posthog.com"
  # WEBHOOK_URL should be set as a secret once the app has a fly.dev hostname:
  #   flyctl secrets set --config packages/agent/fly.toml \
  #     WEBHOOK_URL=https://green-goods-agent.fly.dev/webhook/telegram \
  #     TELEGRAM_WEBHOOK_SECRET=<secret>

[http_service]
  internal_port = 8080
  force_https = true
  # Bot must stay awake — Telegram webhook delivery needs a live listener.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[mounts]
  source = "agent_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
