name: Green Goods
description: Green Goods Indexer
field_selection:
  transaction_fields:
    - hash
contracts:
  - name: ActionRegistry
    handler: src/EventHandlers.ts
    events:
      - event: ActionRegistered(address owner, uint256 indexed actionUID, uint256 indexed startTime, uint256 indexed endTime, string title, string slug, string instructions, uint8[] capitals, string[] media, uint8 domain)
      - event: GardenDomainsUpdated(address indexed garden, uint8 indexed domainMask)
      - event: ActionStartTimeUpdated(address indexed owner, uint256 indexed actionUID, uint256 indexed startTime)
      - event: ActionEndTimeUpdated(address indexed owner, uint256 indexed actionUID, uint256 indexed endTime)
      - event: ActionTitleUpdated(address indexed owner, uint256 indexed actionUID, string title)
      - event: ActionInstructionsUpdated(address indexed owner, uint256 indexed actionUID, string instructions)
      - event: ActionMediaUpdated(address indexed owner, uint256 indexed actionUID, string[] media)
  - name: GardenToken
    handler: src/EventHandlers.ts
    events:
      - event: GardenMinted(uint256 indexed tokenId, address indexed account, string name, string description, string location, string bannerImage, bool openJoining)
  - name: GardenAccount
    handler: src/EventHandlers.ts
    events:
      - event: NameUpdated(address indexed updater, string newName)
      - event: DescriptionUpdated(address indexed updater, string newDescription)
      - event: LocationUpdated(address indexed updater, string newLocation)
      - event: BannerImageUpdated(address indexed updater, string newBannerImage)
      - event: GAPProjectCreated(bytes32 indexed projectUID, address indexed gardenAddress, string projectName)
      - event: OpenJoiningUpdated(address indexed updater, bool openJoining)
  - name: HatsModule
    handler: src/EventHandlers.ts
    events:
      - event: RoleGranted(address indexed garden, address indexed account, uint8 role)
      - event: RoleRevoked(address indexed garden, address indexed account, uint8 role)
  - name: OctantModule
    handler: src/EventHandlers.ts
    events:
      - event: VaultCreated(address indexed garden, address indexed vault, address indexed asset)
      - event: HarvestTriggered(address indexed garden, address indexed asset, address indexed caller)
      - event: EmergencyPaused(address indexed garden, address indexed asset, address indexed caller)
      - event: DonationAddressUpdated(address indexed garden, address indexed oldAddress, address indexed newAddress)
  - name: OctantVault
    handler: src/EventHandlers.ts
    events:
      - event: Deposit(address indexed sender, address indexed owner, uint256 assets, uint256 shares)
      - event: Withdraw(address indexed sender, address indexed receiver, address indexed owner, uint256 assets, uint256 shares)
  - name: GardensModule
    handler: src/EventHandlers.ts
    events:
      - event: CommunityCreated(address indexed garden, address indexed community, uint8 weightScheme, address goodsToken)
      - event: SignalPoolCreated(address indexed garden, address indexed pool, uint8 poolType, address indexed community)
      - event: GardenPowerRegistered(address indexed garden, uint8 weightScheme, uint256 sourceCount)
      - event: GoodsAirdropped(address indexed garden, uint256 totalAmount)
      - event: GardenTreasurySeeded(address indexed garden, uint256 amount)
  - name: YieldSplitter
    handler: src/EventHandlers.ts
    events:
      - event: YieldSplit(address indexed garden, address indexed asset, uint256 cookieJarAmount, uint256 fractionsAmount, uint256 juiceboxAmount, uint256 totalYield)
  - name: CookieJarModule
    handler: src/EventHandlers.ts
    events:
      - event: JarCreated(address indexed garden, address indexed asset, address jar)
  - name: HypercertMinter
    handler: src/EventHandlers.ts
    events:
      - event: TransferSingle(address indexed operator, address indexed from, address indexed to, uint256 id, uint256 value)
      - event: ClaimStored(uint256 indexed claimID, string uri, uint256 totalUnits)
  - name: HypercertMarketplaceAdapter
    handler: src/EventHandlers.ts
    events:
      - event: OrderRegistered(uint256 indexed orderId, uint256 indexed hypercertId, address indexed seller, address currency, uint256 pricePerUnit, uint256 endTime)
      - event: OrderDeactivated(uint256 indexed orderId, address indexed deactivatedBy)
      - event: FractionPurchased(uint256 indexed orderId, uint256 indexed hypercertId, address indexed recipient, uint256 units, uint256 payment)
  - name: UnifiedPowerRegistry
    handler: src/EventHandlers.ts
    events:
      - event: ConfigUpdated(string indexed key, address indexed oldValue, address indexed newValue)
      - event: GardenDeregistered(address indexed garden, uint256 poolsCleared)
  - name: GreenGoodsENS
    handler: src/EventHandlers.ts
    events:
      - event: NameRegistrationSent(bytes32 indexed messageId, string slug, address indexed owner, uint8 nameType, uint256 ccipFee)
      - event: NameReleaseSent(bytes32 indexed messageId, string slug, address indexed previousOwner)
