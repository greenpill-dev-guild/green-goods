  timestamp: Int!
}

# =============================================================================
# Hypercert Entities
# =============================================================================

enum HypercertStatus {
  ACTIVE
  CLAIMED
  SOLD
  UNKNOWN
}

type Hypercert {
  id: ID!                           # chainId-tokenId
  chainId: Int!
  tokenId: BigInt!
  garden: String!                   # Garden address
  metadataUri: String!              # IPFS URI (ipfs://...)
  mintedAt: Int!
  mintedBy: String!                 # Operator address who minted
  txHash: String!
  totalUnits: BigInt!
  claimedUnits: BigInt!
  attestationCount: Int!
  attestationUIDs: [String!]!       # EAS attestation UIDs bundled into this hypercert

  # Metadata fields (populated from IPFS)
  title: String
  description: String
  imageUri: String
  workScopes: [String!]

  status: HypercertStatus!
  # Note: Query claims via HypercertClaim.hypercertId (Envio doesn't support entity arrays)
  createdAt: Int!
  updatedAt: Int!
}

type HypercertClaim {
  id: ID!                           # chainId-hypercertTokenId-claimant
  chainId: Int!
  hypercertId: String!              # Reference to parent Hypercert
  claimant: String!                 # Address who claimed
  units: BigInt!
  claimedAt: Int!
  txHash: String!
}

# =============================================================================
# Garden Treasury Entities
# =============================================================================

type GardenTreasury {
  id: ID!                    # chainId-garden
  chainId: Int!
  garden: String!            # Garden address
  totalSeeded: BigInt!       # Cumulative GOODS seeded
  lastSeededAt: Int!
}

# =============================================================================
# CookieJar Entities
# =============================================================================

type CookieJar {
  id: ID!                    # chainId-garden-asset
  chainId: Int!
  garden: String!            # Garden address
  asset: String!             # Asset address
  jarAddress: String!        # Vault contract address
  createdAt: Int!
}

# =============================================================================
# ENS Registration Entity (L2 CCIP tracking)
# =============================================================================

type ENSRegistration {
  id: ID!                 # chainId-slug (e.g., "42161-alice")
  chainId: Int!
  slug: String!
  owner: String!          # Address that initiated the claim
  nameType: String!       # "Gardener" | "Garden"
  ccipMessageId: String!  # CCIP message ID (bytes32) for cross-chain tracking
  status: String!         # "pending" | "active" | "released"
  ccipFee: BigInt!        # Fee paid for CCIP delivery
  registeredAt: Int!      # Block timestamp of L2 registration
  txHash: String!
}

# =============================================================================
# Hypercert Marketplace Entities
# =============================================================================

type MarketplaceOrder {
  id: ID!                    # chainId-orderId
  chainId: Int!
  orderId: BigInt!
  hypercertId: BigInt!
  seller: String!            # Address
  currency: String!          # Address
  pricePerUnit: BigInt!
  endTime: BigInt!
  active: Boolean!
  totalUnitsSold: BigInt!
  totalPaymentsReceived: BigInt!
  createdAt: Int!
  deactivatedAt: Int
  deactivatedBy: String      # Address (null if still active)
  txHash: String!
}

type MarketplacePurchase {
  id: ID!                    # chainId-txHash-logIndex
  chainId: Int!
  orderId: BigInt!
  hypercertId: BigInt!
  recipient: String!         # Address
  units: BigInt!
  payment: BigInt!
  txHash: String!
  timestamp: Int!
}

