enum Capital {
  SOCIAL
  MATERIAL
  FINANCIAL
  LIVING
  INTELLECTUAL
  EXPERIENTIAL
  SPIRITUAL
  CULTURAL
  UNKNOWN
}

enum Domain {
  SOLAR
  AGRO
  EDU
  WASTE
  UNKNOWN
}

type Action {
  id: ID!
  chainId: Int!
  ownerAddress: String! # Address
  startTime: BigInt!
  endTime: BigInt!
  title: String!
  slug: String!                     # On-chain slug (e.g., "waste.cleanup_event")
  instructions: String!
  capitals: [Capital!]!
  media: [String!]!
  domain: Domain!                   # Domain category
  createdAt: Int!
}

# Tracks which domains are enabled for each garden
type GardenDomains {
  id: ID!                           # gardenAddress
  chainId: Int!
  garden: String!                   # Garden address
  domainMask: Int!                  # Bitmask: bit 0=Solar, 1=Agro, 2=Edu, 3=Waste
  domains: [Domain!]!              # Expanded for query convenience
  updatedAt: Int!
}

type Garden {
  id: ID! # Address
  chainId: Int!
  tokenAddress: String! # Address
  tokenID: BigInt!
  name: String!
  description: String!
  location: String!
  bannerImage: String!
  openJoining: Boolean!
  createdAt: Int!

  gardeners: [String!]! # Address
  operators: [String!]! # Address
  evaluators: [String!]! # Address
  owners: [String!]! # Address
  funders: [String!]! # Address
  communities: [String!]! # Address
  
  # Karma GAP Integration
  gapProjectUID: String # Karma GAP project attestation UID (bytes32)

  # ENS Integration
  slug: String          # ENS subdomain slug (e.g., "my-garden" for my-garden.greengoods.eth)
  ensStatus: String     # "pending" | "active" | "released" — tracked via CCIP events
}

type GardenHatTree {
  id: ID!                    # gardenAddress
  chainId: Int!
  garden: String!            # Garden address
  adminHatId: String!        # Admin hat ID (uint256 as string)
  ownerHatId: String         # Available when GardenConfigured event is indexed
  operatorHatId: String
  evaluatorHatId: String
  gardenerHatId: String
  funderHatId: String
  communityHatId: String
  createdAt: Int!
}

type PartialGrantFailure {
  id: ID!                    # chainId-txHash-logIndex
  chainId: Int!
  garden: String!            # Garden address
  account: String!           # Account that failed to receive role
  role: Int!                 # GardenRole enum value (0-5)
  reason: String!            # Error reason
  txHash: String!
  timestamp: Int!
}

enum VaultEventType {
  DEPOSIT
  WITHDRAW
  HARVEST
  EMERGENCY_PAUSED
}

type GardenVault {
  id: ID! # chainId-garden-asset
  chainId: Int!
  garden: String! # Garden address
  asset: String! # Asset address
  vaultAddress: String! # Vault contract address
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  totalHarvestCount: Int!
  donationAddress: String
  depositorCount: Int!
  paused: Boolean!
  createdAt: Int!
}

type GardenVaultIndex {
  id: ID! # chainId-garden
  chainId: Int!
  garden: String!
  assets: [String!]!
}

type VaultAddressIndex {
  id: ID! # chainId-vaultAddress
  chainId: Int!
  vaultAddress: String!
  garden: String!
  asset: String!
}

type VaultDeposit {
  id: ID! # chainId-vault-depositor
  chainId: Int!
  garden: String! # Garden address
  asset: String! # Asset address
  vaultAddress: String! # Vault contract address
  depositor: String! # Depositor address
  shares: BigInt!
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
}

type VaultEvent {
  id: ID! # chainId-txHash-logIndex
  chainId: Int!
  garden: String! # Garden address
  asset: String! # Asset address
  vaultAddress: String! # Vault contract address
  eventType: VaultEventType!
  actor: String! # Caller/sender
  amount: BigInt
  shares: BigInt
  txHash: String!
  timestamp: Int!
}

type Gardener {
  id: ID! # Smart account address
  chainId: Int!
  createdAt: Int!
  firstGarden: String # First garden joined
  gardens: [String!]! # All gardens this gardener belongs to
  
  # Identity (from Gardener smart contract on mainnet or L2)
  owner: String # Current owner key (EOA from passkey)
  
  # ENS Identity (from mainnet Gardener contract)
  ensName: String # Full ENS name (e.g., "alice.greengoods.eth")
  passkeyCredentialId: String # WebAuthn credential ID (bytes32) for recovery
  claimedAt: Int # Timestamp of ENS claim on mainnet
  
  # Profile data stored in ENS text records (mainnet only)
  # Not populated by Envio handlers; resolved client-side from ENS resolver reads.
  # Query via ENS resolver: resolver.text(node, "avatar"), resolver.text(node, "description"), etc.
  ensAvatar: String # ENS text record: avatar
  ensDescription: String # ENS text record: description
  ensTwitter: String # ENS text record: com.twitter
  ensGithub: String # ENS text record: com.github
  ensEmail: String # ENS text record: email
  
  # Future extensibility:
  # - totalWork: Int
  # - approvals: [WorkApproval!]
  # - reputation: Int
  # - attestations: [Attestation!]
}

