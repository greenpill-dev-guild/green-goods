type GardenSignalPool {
  id: ID! # chainId-garden-poolAddress
  chainId: Int!
  garden: String! # Garden address
  poolAddress: String! # CVStrategy pool address
  poolType: PoolType!
  communityAddress: String! # Parent RegistryCommunity
  createdAt: Int!
}

