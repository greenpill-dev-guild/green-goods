# ═══════════════════════════════════════════════════════════════════════════════
# DEFAULT PROFILE — Full Build with Selective via_ir (Tests & Deployment)
# ═══════════════════════════════════════════════════════════════════════════════
# Most contracts compile with the fast pipeline.
# Only known stack-too-deep files use via_ir via compilation_restrictions below.
[profile.default]
solc = "0.8.28"
ffi = true
auto_detect_solc = false
block_timestamp = 1_680_220_800 # March 31, 2023 at 00:00 GMT
bytecode_hash = "none"
evm_version = "cancun"
fuzz = { runs = 1_000 }
gas_reports = []         # Disabled for speed
optimizer = true
optimizer_runs = 200     # Keep current optimizer behavior to avoid stack-depth regressions
verbosity = 1
libs = ['lib', 'node_modules', '../../node_modules']
out = 'out'
script = "script"
src = 'src'
test = 'test'
via_ir = false
sparse_mode = true       # Only recompile changed files
fs_permissions = [
  { access = "read-write", path = "./" }
]
cache = true
cache_path = "cache"
extra_output_files = [
  "abi",
  "evm.bytecode"
]
additional_compiler_profiles = [
  { name = "via-ir", via_ir = true }
]

# NOTE: No custom optimizer_details — Solidity defaults handle stack depth correctly.
# Custom yul_details (stack_allocation, optimizer_steps) interfered with via_ir
# compilation of forge-std/StdStorage.sol.

[[profile.default.compilation_restrictions]]
paths = "src/accounts/Garden.sol"
via_ir = true

[[profile.default.compilation_restrictions]]
paths = "src/tokens/Garden.sol"
via_ir = true

[[profile.default.compilation_restrictions]]
paths = "src/registries/Action.sol"
via_ir = true

[[profile.default.compilation_restrictions]]
paths = "src/registries/Deployment.sol"
via_ir = true

[[profile.default.compilation_restrictions]]
paths = "src/mocks/Hats.sol"
via_ir = true

[[profile.default.compilation_restrictions]]
paths = "src/modules/Karma.sol"
via_ir = true

[[profile.default.compilation_restrictions]]
paths = "src/mocks/Juicebox.sol"
via_ir = true

[[profile.default.compilation_restrictions]]
paths = "test/helpers/DeploymentBase.sol"
via_ir = true

[[profile.default.compilation_restrictions]]
paths = "lib/tokenbound/lib/forge-std/src/StdStorage.sol"
via_ir = true

# ═══════════════════════════════════════════════════════════════════════════════
# CORE PROFILE — Fast Iteration (Explicit Contract Selection)
# ═══════════════════════════════════════════════════════════════════════════════
# Use: bun run build:core (uses --contracts flag for explicit selection)
# Core contracts now use IGardenAccount interface, so they compile without via_ir
# NOTE: Use --contracts flag instead of ignore pattern for reliable exclusion
[profile.core]
solc = "0.8.28"
ffi = true
auto_detect_solc = false
block_timestamp = 1_680_220_800
bytecode_hash = "none"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
verbosity = 1
libs = ['lib', 'node_modules', '../../node_modules']
out = 'out-core'
src = 'src'
via_ir = false           # Fast builds for core contracts using interfaces
sparse_mode = true
fs_permissions = [
  { access = "read-write", path = "./" }
]
cache = true
cache_path = "cache-core"

# ═══════════════════════════════════════════════════════════════════════════════
# LITE PROFILE — Fast Tests (Tests Without Account Instantiation)
# ═══════════════════════════════════════════════════════════════════════════════
# NOTE: via_ir=false does NOT work for the full source tree due to stack-too-deep
# constraints in selected contracts.
# See [profile.default.compilation_restrictions] for the authoritative list.
# This profile only works for files that don't transitively import those contracts.
# For general fast builds, use `forge build --skip test --skip script` with
# the default profile (selective via_ir + optimizer_runs=200).
[profile.lite]
solc = "0.8.28"
ffi = true
auto_detect_solc = false
block_timestamp = 1_680_220_800
bytecode_hash = "none"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1
verbosity = 1
libs = ['lib', 'node_modules', '../../node_modules']
out = 'out-lite'
script = "script"
src = 'src'
test = 'test'
via_ir = false
sparse_mode = true
gas_reports = []
fs_permissions = [
  { access = "read-write", path = "./" }
]
cache = true
cache_path = "cache-lite"

# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTION PROFILE — Deployment Optimized (Smallest Bytecode)
# ═══════════════════════════════════════════════════════════════════════════════
# Use for: `FOUNDRY_PROFILE=production forge build` before mainnet deploy
# Uses via_ir = true (required) with minimal optimizer_runs for smallest bytecode
[profile.production]
via_ir = true            # Required for TBA/Kernel contracts
optimizer = true
optimizer_runs = 1       # Smallest bytecode (lower = smaller, but more gas per call)
gas_reports = ["*"]
verbosity = 2
bytecode_hash = "none"
out = "out-production"
cache_path = "cache-production"

# ═══════════════════════════════════════════════════════════════════════════════
# CI PROFILE — Thorough Testing
# ═══════════════════════════════════════════════════════════════════════════════
# Use for: GitHub Actions CI/CD
[profile.ci]
via_ir = true            # Required for full codebase compilation
optimizer = true
optimizer_runs = 200     # Balance between bytecode size and gas efficiency
fuzz = { runs = 10_000 }
verbosity = 4
out = "out-ci"
cache_path = "cache-ci"

# ═══════════════════════════════════════════════════════════════════════════════
# E2E PROFILE — Integration Tests
# ═══════════════════════════════════════════════════════════════════════════════
[profile.e2e]
via_ir = true            # Required for full codebase
match_contract = "E2E"
verbosity = 3
out = "out-e2e"
cache_path = "cache-e2e"

# ═══════════════════════════════════════════════════════════════════════════════
# FORK PROFILE — Fork Tests Against Real Infrastructure
# ═══════════════════════════════════════════════════════════════════════════════
[profile.fork]
via_ir = true
gas_limit = 30_000_000
fuzz = { runs = 32 }
verbosity = 3
out = "out-fork"
cache_path = "cache-fork"

[etherscan]
  arbitrum = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chainId = "42161" }
  sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chainId = "11155111" }
  baseSepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chainId = "84532" }
  celo = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chainId = "42220" }
  mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chainId = "1" }

[fmt]
  ignore = ["src/vendor/**"]
  bracket_spacing = true
  int_types = "long"
  line_length = 124
  multiline_func_header = "all"
  number_underscore = "thousands"
  quote_style = "double"
  tab_width = 4
  wrap_comments = true

[lint]
exclude_lints = [
  "mixed-case-function",
  "mixed-case-variable",
  "erc20-unchecked-transfer",
  "incorrect-shift"
]

# RPC endpoints for different networks
# IMPORTANT: Only add endpoints with guaranteed env vars here. Foundry eagerly resolves
# all [rpc_endpoints] at startup via StdCheats.rpcUrlStructs(), so missing env vars break
# ALL tests — not just fork tests. Fork tests load RPC URLs via vm.envString() instead.
# Deploy scripts use profile-specific eth_rpc_url (see [profile.*] sections below).
[rpc_endpoints]
localhost = "http://localhost:8545"

# Network-specific profiles
[profile.local]
eth_rpc_url = "http://localhost:8545"

[profile.arbitrum]
eth_rpc_url = "${ARBITRUM_RPC_URL}"

[profile.sepolia]
eth_rpc_url = "${SEPOLIA_RPC_URL}"

[profile.celo]
eth_rpc_url = "${CELO_RPC_URL}"
# NOTE: evm_version = "cancun" (from default profile) is safe for Celo.
# Celo L2 (migrated March 26, 2025) enables Shanghai + Cancun hardforks,
# so PUSH0 (EIP-3855) is fully supported. No paris fallback needed.

# See more config options https://github.com/foundry-rs/foundry/tree/master/config
