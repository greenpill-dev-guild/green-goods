    />
    <!-- Fraunces (editorial serif, public-browser headlines + stat numbers). -->
    <!-- To trial a different serif, swap the family below AND `--font-serif` in shared theme.css. -->
    <!-- See packages/client/DESIGN.browser.md → Typography → Serif options. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&display=swap" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&display=swap"
      rel="stylesheet"
    />

    <title>Green Goods</title>
    <script>
      // Set theme before render to prevent flash
      (function() {
        var stored = localStorage.getItem('theme') || 'system';
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'dark' || (stored === 'system' && systemDark);
        document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
