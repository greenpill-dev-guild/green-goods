# fly.toml app configuration file generated for green-goods on 2026-04-25T12:25:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'green-goods'
primary_region = 'ams'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  dockerfile = 'packages/agent/Dockerfile'

[env]
  ANALYTICS_ENABLED = 'true'
  BOT_MODE = 'webhook'
  DB_PATH = '/data/agent.db'
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '8080'
  POSTHOG_HOST = 'https://us.i.posthog.com'

[[mounts]]
  source = 'agent_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
