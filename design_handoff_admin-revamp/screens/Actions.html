<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Green Goods · /actions</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="hub.css" />
<link rel="stylesheet" href="actions.css" />
<link rel="stylesheet" href="sheet-system.css" />

<style>
  body {
    background: #E8E2D8;
    color: #292524;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── Design canvas shell ── */
  .dc-root {
    padding: 48px 40px 80px;
    max-width: 1680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 72px;
  }

  .dc-page-header { margin-bottom: 0; }
  .dc-page-title {
    margin: 0 0 4px;
    font: 700 18px/1.2 "Plus Jakarta Sans", sans-serif;
    letter-spacing: -0.01em;
    color: #292524;
  }
  .dc-page-sub {
    margin: 0;
    font: 500 13px/1.4 "Plus Jakarta Sans", sans-serif;
    color: #57534E;
  }

  /* ── Section ── */
  .dc-section { display: flex; flex-direction: column; gap: 16px; }
  .dc-section-title {
    font: 600 11px/1 "Plus Jakarta Sans", sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #78716C;
  }

  /* ── Artboard ── */
  .dc-artboard-wrap { display: flex; flex-direction: column; gap: 10px; }
  .dc-artboard-label {
    font: 500 12px/1 "JetBrains Mono", ui-monospace, monospace;
    color: #78716C;
  }
  .dc-artboard {
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(41,37,36,0.12), 0 1px 4px rgba(41,37,36,0.06);
    display: inline-block;
    width: 1440px;
    height: 1024px;
    flex-shrink: 0;
    position: relative;
  }

  /* ── Docs card ── */
  .docs-card {
    background: #FFFFFF;
    border: 1px solid rgba(41,37,36,0.08);
    border-radius: 16px;
    padding: 28px 32px;
    box-shadow: 0 1px 2px rgba(41,37,36,0.04);
    max-width: 1080px;
  }
  .docs-card h2 {
    margin: 0 0 8px;
    font: 700 17px/1.2 "Plus Jakarta Sans", sans-serif;
    letter-spacing: -0.01em;
  }
  .docs-card p {
    margin: 0 0 10px;
    font: 400 13px/1.6 "Plus Jakarta Sans", sans-serif;
    color: #44403C;
    text-wrap: pretty;
  }
  .docs-card p:last-child { margin-bottom: 0; }
  .docs-card strong { color: #1A7544; font-weight: 600; }

  /* ── Sheet legend ── */
  .sheet-legend {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-top: 16px;
  }
  .sheet-legend-item {
    padding: 16px;
    background: #F5F0E8;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sheet-legend-item-label {
    font: 700 11px/1 "Plus Jakarta Sans", sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #78716C;
  }
  .sheet-legend-item-desc {
    font: 400 12px/1.55 "Plus Jakarta Sans", sans-serif;
    color: #44403C;
    text-wrap: pretty;
  }
  ul.crumb { list-style: none; margin: 12px 0 0; padding: 0; display: flex; flex-wrap: wrap; gap: 6px 8px; }
  ul.crumb li {
    font: 500 11px/1 "JetBrains Mono", ui-monospace, monospace;
    padding: 5px 9px; background: #F5F0E8; color: #44403C;
    border: 1px solid rgba(41,37,36,0.06); border-radius: 9999px;
  }
  ul.crumb li.ok { background: #E0FAEC; color: #1A7544; border-color: rgba(31,193,107,0.24); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<script type="text/babel" src="hub-atoms.jsx"></script>
<script type="text/babel" src="actions-atoms.jsx"></script>
<script type="text/babel" src="sheet-system.jsx"></script>
<script type="text/babel" src="actions-a.jsx"></script>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
function App() {
  return (
    <div className="dc-root">

      {/* ── Page header ── */}
      <div className="dc-page-header">
        <h1 className="dc-page-title">Green Goods · /actions</h1>
        <p className="dc-page-sub">Sheet system exploration · Filter row fix · Scrollbar fix</p>
      </div>

      {/* ══ 01 — Grid · light · no sheets ══ */}
      <div className="dc-section" data-screen-label="01 Grid — light">
        <div className="dc-section-title">01 · Grid — light · filters on one row · no sheets open</div>
        <div className="dc-artboard-wrap">
          <div className="dc-artboard-label">Actions · light · 1440 × 1024</div>
          <div className="dc-artboard">
            <ActionsA theme="light" />
          </div>
        </div>
      </div>

      {/* ══ 02 — Grid · dark · no sheets ══ */}
      <div className="dc-section" data-screen-label="02 Grid — dark">
        <div className="dc-section-title">02 · Grid — dark · filters on one row · no sheets open</div>
        <div className="dc-artboard-wrap">
          <div className="dc-artboard-label">Actions · dark · 1440 × 1024</div>
          <div className="dc-artboard">
            <ActionsA theme="dark" />
          </div>
        </div>
      </div>

      {/* ══ 03 — Notifications sheet · light ══ */}
      <div className="dc-section" data-screen-label="03 Notifications sheet — light">
        <div className="dc-section-title">03 · RightSheet — notifications · header-triggered · light</div>
        <div className="dc-artboard-wrap">
          <div className="dc-artboard-label">Actions · notifications sheet · light · 1440 × 1024</div>
          <div className="dc-artboard">
            <ActionsA theme="light" showHeaderSheet="notifications" />
          </div>
        </div>
      </div>

      {/* ══ 04 — Profile sheet · light ══ */}
      <div className="dc-section" data-screen-label="04 Profile sheet — light">
        <div className="dc-section-title">04 · RightSheet — profile / account · header-triggered · light</div>
        <div className="dc-artboard-wrap">
          <div className="dc-artboard-label">Actions · profile sheet · light · 1440 × 1024</div>
          <div className="dc-artboard">
            <ActionsA theme="light" showHeaderSheet="profile" />
          </div>
        </div>
      </div>

      {/* ══ 05 — Settings sheet · dark ══ */}
      <div className="dc-section" data-screen-label="05 Settings sheet — dark">
        <div className="dc-section-title">05 · RightSheet — settings · header-triggered · dark</div>
        <div className="dc-artboard-wrap">
          <div className="dc-artboard-label">Actions · settings sheet · dark · 1440 × 1024</div>
          <div className="dc-artboard">
            <ActionsA theme="dark" showHeaderSheet="settings" />
          </div>
        </div>
      </div>

      {/* ══ 06 — Template detail (content RightSheet) · light ══ */}
      <div className="dc-section" data-screen-label="06 Template detail — light">
        <div className="dc-section-title">06 · Content RightSheet — template detail · card-click triggered · light</div>
        <div className="dc-artboard-wrap">
          <div className="dc-artboard-label">Actions · template detail · light · 1440 × 1024</div>
          <div className="dc-artboard">
            <ActionsA theme="light" showRightSheet={true} />
          </div>
        </div>
      </div>

      {/* ══ 07 — Create wizard (LeftSheet) · dark ══ */}
      <div className="dc-section" data-screen-label="07 Create wizard — dark">
        <div className="dc-section-title">07 · LeftSheet — create wizard · FAB-triggered · dark</div>
        <div className="dc-artboard-wrap">
          <div className="dc-artboard-label">Actions · create wizard · dark · 1440 × 1024</div>
          <div className="dc-artboard">
            <ActionsA theme="dark" showWizard={true} />
          </div>
        </div>
      </div>

      {/* ══ 08 — Both sheets simultaneously · light ══ */}
      <div className="dc-section" data-screen-label="08 Both sheets simultaneously — light">
        <div className="dc-section-title">08 · Both sheets open simultaneously — LeftSheet wizard + RightSheet notifications · light</div>
        <div className="dc-artboard-wrap">
          <div className="dc-artboard-label">Actions · both sheets · light · 1440 × 1024</div>
          <div className="dc-artboard">
            <ActionsA theme="light" showWizard={true} showHeaderSheet="notifications" />
          </div>
        </div>
      </div>

      {/* ══ SHEET SYSTEM DOCS ══ */}
      <div className="dc-section" data-screen-label="09 Sheet system docs">
        <div className="dc-section-title">09 · Sheet system — architecture notes</div>
        <div className="docs-card">
          <h2>Sheet system architecture</h2>
          <p>
            Two generic container components — <strong>LeftSheet</strong> and <strong>RightSheet</strong> — bound between the AppBar (top: 64px) and the NavBar (bottom: 64px). Content is passed as children; the shell handles animation, scrim, and close. Because they occupy opposite sides of the canvas, they never visually conflict and require no z-index ordering between them.
          </p>
          <div className="sheet-legend">
            <div className="sheet-legend-item">
              <div className="sheet-legend-item-label">LeftSheet · action-oriented</div>
              <div className="sheet-legend-item-desc">
                Triggered by the FAB or in-content action buttons. Houses creation wizards and bulk-edit flows. Slides in from the left edge with a scrim over the MainSheet. Width: 480px. Current content: Create action template wizard (4-step).
              </div>
            </div>
            <div className="sheet-legend-item">
              <div className="sheet-legend-item-label">RightSheet · header-triggered</div>
              <div className="sheet-legend-item-desc">
                Triggered by AppBar icon buttons (bell, gear, avatar). Each icon toggles its own sheet — clicking again closes it. All three content components slot into the same RightSheet shell. Width: 360px. Content: Notifications, Profile / Account, Settings.
              </div>
            </div>
            <div className="sheet-legend-item">
              <div className="sheet-legend-item-label">Content RightSheet · card-triggered</div>
              <div className="sheet-legend-item-desc">
                Triggered by clicking a template card. This is a separate inline aside (not the generic RightSheet shell) — it lives inside the MainSheet layout and collapses the grid from 3-col to 2-col. It can coexist with the header RightSheet since it occupies the content zone, not the overlay layer.
              </div>
            </div>
            <div className="sheet-legend-item">
              <div className="sheet-legend-item-label">Simultaneous coexistence</div>
              <div className="sheet-legend-item-desc">
                LeftSheet and RightSheet can both be open at the same time. A user may be mid-wizard (LeftSheet) and receive a notification (bell icon → RightSheet). No z-index conflict: left vs right sides of the canvas. Each sheet has its own scrim that covers the MainSheet only.
              </div>
            </div>
          </div>
          <ul className="crumb" style={{marginTop: 20}}>
            <li className="ok">Bounded AppBar → NavBar ✓</li>
            <li className="ok">Toggle open / close on same icon ✓</li>
            <li className="ok">Both sheets simultaneously ✓</li>
            <li className="ok">Single scroll region (mainsheet only) ✓</li>
            <li className="ok">Hidden scrollbars on sheet bodies ✓</li>
            <li className="ok">Filters on one row ✓</li>
            <li className="ok">Content slots into generic shell ✓</li>
            <li className="ok">Spring easing (0.16,1,0.3,1) 300ms ✓</li>
          </ul>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
